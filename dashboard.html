<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX Dashboard</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <span class="hamburger" id="menu-btn">&#9776;</span>
            <div class="logo">OMNIX</div>
        </div>
        <div class="nav-links">
            <button id="theme-toggle" class="theme-btn">☀️</button>
            <button id="logout-btn" class="action-btn btn-signin">Log Out</button>
        </div>
    </nav>
    
  <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>My Profile</h3>
            <span class="close-sidebar" id="close-btn">&times;</span>
        </div>
        
        <div class="avatar-section">
            <img id="profile-avatar" src="" alt="User Avatar">
        </div>
        <div class="profile-info">
            <p><strong>Name:</strong> <span id="profile-name">Loading...</span></p>
            <p><strong>Username:</strong> <span id="profile-username">Loading...</span></p>
            <p><strong>Email:</strong> <span id="profile-email">Loading...</span></p>
        </div>
    </div>
    
    <div id="sidebar-overlay" class="overlay"></div>
  <main class="hero">
        <p class="welcome-text">W E L C O M E</p>
        <h1 class="main-title" id="welcome-name" style="font-size: 2rem;"
            >User</h1> 
    <div class="dashboard-btn-group">
            <button id="vlog-btn" class="action-btn dash-big-btn">🎥 Watch Vlogs</button>
            <button id="chat-btn" class="action-btn dash-big-btn">💬 Chat</button>
        </div>
       </main>
    <footer class="footer">
        <div class="footer-features">
            <span>Free forever</span> &bull; 
            <span>No ads</span> &bull; 
            <span>Secure</span>
        </div>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Contact</a>
        </div>
        <div class="footer-copy">
            &copy; 2026 OMNIX . All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=999"></script>
    <script src="dashboard.js"></script>
    
        <div id="video-modal" class="video-modal">
        <div class="video-modal-content">
            <span class="close-video-modal" id="close-video-btn">&times;</span>
            <h2 style="color: white; margin-bottom: 20px;">My Vlogs</h2>
            
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/V9S89fuz2zg" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/wZ_1qnS_WqI" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/1bylagwwd-k" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/WJwVyi28TPs" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/VaFgqW49U1M" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <div class="playlist-section">
                <p>For more videos Visit on:</p>
                <a href="https://youtube.com/playlist?list=PLuD5IiJknDWIzjVTJ5OiFEA7WOnCKMBX2&si=4ASZxze6MtG95gU9" target="_blank" class="playlist-btn">▶ Playlist</a>
            </div>
        </div>
        </div>
    </div>
</body>
</html>

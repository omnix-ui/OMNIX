<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
        <div id="preloader">
        <div class="loader-logo">OMNIX</div>
        <div class="loader-spinner"></div>
    </div>
    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="logo">OMNIX</div>
        <div class="nav-links">
            <button id="theme-toggle" class="theme-btn">☀️</button>
            <a href="#" class="btn-signin">Sign In</a>
            <a href="#" class="signup-link btn-signup">Sign Up</a>
        </div>
    </nav>

    <!-- Main Center Content -->
    <main class="hero">
        <p class="welcome-text">W E L C O M E &nbsp; T O</p>
        
        <!-- Gradient Text Heading -->
        <h1 class="main-title">OMNIX</h1>
        
        <p class="tagline">Simple. Modern. Premium.</p>
        
        <!-- Center Action Button (Ye bhi Sign in kholega) -->
        <button class="action-btn btn-signin">Sign In</button>
    </main>

    <!-- Custom Footer -->
    <footer class="footer">
        <div class="footer-features">
            <span>Free forever</span> &bull; 
            <span>No ads</span> &bull; 
            <span>Secure</span>
        </div>
        
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Contact</a>
        </div>
        
        <div class="footer-copy">
            &copy; 2026 OMNIX . All rights reserved.
        </div>
    </footer>

    <!-- MODALS (POPUPS) YAHAN HAIN FOOTER KE BAAD -->
    
    <!-- 1. Sign In Popup -->
    <div id="signin-modal" class="modal">
        <div class="glass-panel">
            <span class="close-btn">&times;</span>
            <h2>Sign In</h2>
            <form>
                <input type="text" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="action-btn popup-btn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- 2. Sign Up Popup -->
    <div id="signup-modal" class="modal">
        <div class="glass-panel">
            <span class="close-btn">&times;</span>
            <h2>Create Account</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="action-btn popup-btn">Sign Up</button>
            </form>
        </div>
    </div>

          <!-- JavaScript Links -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

</body>
</html>
